name: Actualizar resultados Mundial

on:
  schedule:
    # Cada 6 horas (UTC). Ajusta si quieres más o menos frecuencia.
    - cron: '0 */2 * * *'
  workflow_dispatch: {}  # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests openpyxl

      - name: Actualizar data.js con resultados reales
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "Porra Bot"
          git config user.email "actions@github.com"
          if git diff --quiet data.js; then
            echo "Sin cambios, nada que subir."
          else
            git add data.js
            git commit -m "Actualización automática de resultados $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
